<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notion Daily Encouragement Widget</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&family=Inter:wght@700&display=swap" rel="stylesheet">
    <style>
        /* 기본 여백 제거 및 중앙 정렬 방어벽 */
        html, body { 
            margin: 0; 
            padding: 0; 
            background-color: transparent; 
            overflow: hidden; 
        }
        
        #widget-container { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            width: 100vw; 
            white-space: nowrap; 
        }
        
        /* 1. 해 아이콘 크기 축소 (35px) */
        #sun-icon { 
            height: 35px; 
            width: auto; 
            margin-right: 12px; 
            object-fit: contain; 
        }
        
        /* 2. TODAY | 크기 축소 (24px) */
        #today-container { 
            font-size: 24px; 
            font-weight: bold; 
            font-family: 'Inter', sans-serif; 
            color: #007bff; 
            margin-right: 16px; 
            letter-spacing: -0.5px;
        }
        
        /* 3. 메시지 텍스트 크기 축소 (22px) */
        #message-text { 
            font-size: 22px; 
            color: #555; 
            font-family: 'Nanum Pen Script', cursive; 
            display: flex; 
            align-items: center; 
            margin-top: 2px; /* 폰트 특성상 위로 살짝 뜨는 것을 미세 조정 */
        }
        
        .heart-icon { 
            margin-left: 0; 
        }
    </style>
</head>
